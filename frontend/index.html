<!doctype html>
<html lang="it" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inRebus Agency - Recruitment Matching System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </head>
  <body>
    <canvas id="particle-canvas"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Beautiful Particle Network Background
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');

      let width, height;
      let particles = [];

      function init() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        
        ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'light' ? '#f8fafc' : '#09090b';
        ctx.fillRect(0, 0, width, height);

        particles = [];
        const numParticles = Math.min(Math.floor((width * height) / 10000), 100);
        for (let i = 0; i < numParticles; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            radius: Math.random() * 1.5 + 0.5
          });
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        
        ctx.clearRect(0, 0, width, height);
        
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        ctx.fillStyle = isLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.15)';

        for (let i = 0; i < particles.length; i++) {
          let p = particles[i];
          
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 0 || p.x > width) p.vx = -p.vx;
          if (p.y < 0 || p.y > height) p.vy = -p.vy;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();

          for (let j = i + 1; j < particles.length; j++) {
            let p2 = particles[j];
            let dx = p.x - p2.x;
            let dy = p.y - p2.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 120) {
              ctx.beginPath();
              ctx.strokeStyle = isLight 
                ? `rgba(241, 100, 33, ${0.1 * (1 - dist/120)})`
                : `rgba(249, 115, 22, ${0.15 * (1 - dist/120)})`;
              ctx.lineWidth = 1;
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.stroke();
            }
          }
        }
      }

      window.addEventListener('resize', init);
      init();
      animate();

      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.attributeName === 'data-theme') {
            init(); // Reinit with correct colors
          }
        });
      });
      observer.observe(document.documentElement, { attributes: true });
    </script>
  </body>
</html>
